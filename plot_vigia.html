<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="utf-8">
<title>Comparativo tiempos de retorno</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

#chart{
    width:100%;
    height:100%;
}
</style>

</head>

<body>

<div id="chart"></div>

<script>

const params = new URLSearchParams(window.location.search);

const rivid = params.get("rivid") || "610329766";
const nombreRio = params.get("rio") || "Río";

const forecastUrl =
"https://services8.arcgis.com/UYEK9SUzH1am9mbk/arcgis/rest/services/Quebradas/FeatureServer/2/query" +
"?where=rivid=" + rivid +
"&outFields=*" +
"&f=json";

const rpUrl =
"https://services8.arcgis.com/UYEK9SUzH1am9mbk/arcgis/rest/services/Quebradas/FeatureServer/3/query" +
"?where=rivid=" + rivid +
"&outFields=*" +
"&f=json";

Promise.all([
    fetch(forecastUrl).then(r => r.json()),
    fetch(rpUrl).then(r => r.json())
])
.then(([forecastData, rpData]) => {

    if(!forecastData.features.length || !rpData.features.length){
        console.error("Sin datos");
        return;
    }

    // Qmax pronosticado
    const median = forecastData.features.map(
        f => f.attributes.flow_median
    );

    const qmax = Math.max(...median);

    // Periodos de retorno
    const rp = rpData.features[0].attributes;

    const rp2 = rp.rp2;
    const rp5 = rp.rp5;
    const rp10 = rp.rp10;
    const rp25 = rp.rp25;
    const rp50 = rp.rp50;
    const rp100 = rp.rp100;

    Plotly.newPlot(
        "chart",
        [

            {
                x:[0,1],
                y:[rp100,rp100],
                mode:"lines",
                name:"TR 100 años",
                line:{
                    color:"green",
                    width:3
                }
            },

            {
                x:[0,1],
                y:[rp50,rp50],
                mode:"lines",
                name:"TR 50 años",
                line:{
                    color:"blue",
                    width:3
                }
            },

            {
                x:[0,1],
                y:[rp25,rp25],
                mode:"lines",
                name:"TR 25 años",
                line:{
                    color:"purple",
                    width:3
                }
            },

            {
                x:[0,1],
                y:[rp10,rp10],
                mode:"lines",
                name:"TR 10 años",
                line:{
                    color:"red",
                    width:3
                }
            },

            {
                x:[0,1],
                y:[rp5,rp5],
                mode:"lines",
                name:"TR 5 años",
                line:{
                    color:"orange",
                    width:3
                }
            },

            {
                x:[0,1],
                y:[rp2,rp2],
                mode:"lines",
                name:"TR 2 años",
                line:{
                    color:"gold",
                    width:3
                }
            },

            {
                x:[0,1],
                y:[qmax,qmax],
                mode:"lines",
                name:"Qmax pronosticado",
                line:{
                    color:"black",
                    width:4,
                    dash:"dash"
                }
            }

        ],

        {
            autosize:true,

            title:{
                text:`Comparativo periodos de retorno - ${nombreRio}`,
                x:0.5
            },

            margin:{
                l:70,
                r:180,
                t:60,
                b:40
            },

            xaxis:{
                visible:false,
                fixedrange:true
            },

            yaxis:{
                title:"Caudal (m³/s)"
            },

            legend:{
                x:1.02,
                y:1,
                xanchor:"left",
                yanchor:"top",
                bgcolor:"rgba(255,255,255,0.8)"
            }
        },

        {
            responsive:true,
            displayModeBar:false
        }
    );

});

window.addEventListener('resize', () => {
    Plotly.Plots.resize(
        document.getElementById('chart')
    );
});

</script>

</body>
</html>
